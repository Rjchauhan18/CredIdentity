services:
  credidentity:
    build: .
    image: credidentity
    ports:
      - "7860:7860"
    environment:
      # Public model repo — no token needed. Slim WeightedEnsemble_L2_FULL (7-model
      # blend, 43MB): <=5pt drift vs the full stack, no tier changes, seconds-fast load.
      HF_MODEL_REPO: HydrallHarsh/Credidentity-slim-model
    volumes:
      # Model lives on a NAMED VOLUME (Docker VM's native ext4), not a Windows
      # bind-mount. Bind-mounting over Windows->WSL2 breaks mmap/pickle reads of
      # the CatBoost child models (ENOMEM). Named volume => mmap works AND the
      # model persists across runs, so it still downloads only once.
      - model_weights:/workspace/model/local_model_weights
      # Live code — edit and just refresh, no rebuild. (Plain source, mmap-safe.)
      - ./dashboard:/workspace/dashboard
      - ./backend:/workspace/backend
      - ./data:/workspace/data

volumes:
  model_weights:
