name: Sync Repository to Hugging Face Spaces

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Baseline
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push Repository Assets to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN_WRITE }}
        run: |
          git remote add hf https://x-token-auth:$HF_TOKEN@huggingface.co/spaces/Rjchauhan/credidentity
          git push --force hf main